name: focusbell
description: "Project priority reminder — stay locked in."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3
  path: ^1.9.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^18.0.0   # Known working version
  flutter_foreground_task: ^8.15.1
  flutter_timezone: ^4.1.1 
  flutter_markdown: ^0.7.4
  url_launcher: ^6.3.0
  timezone: ^0.9.2
  uuid: ^4.5.3
  intl: ^0.19.0   
  audioplayers: ^6.7.0
  image_picker: ^1.2.2
  record: ^7.0.0
  home_widget: ^0.6.0
  file_picker: ^8.3.0
  open_filex: ^4.5.0
  
 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/sounds/tick.mp3
    - assets/sounds/complete.wav
  uses-material-design: true
  